<!DOCTYPE html>
<html>
<head>
    <title>OptiCrop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center text-success">🌱 OptiCrop Recommendation System</h2>

<form action="/predict" method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Nitrogen (N)</label>
<input type="number" class="form-control" name="N" required>
</div>

<div class="col-md-6 mb-3">
<label>Phosphorous (P)</label>
<input type="number" class="form-control" name="P" required>
</div>

<div class="col-md-6 mb-3">
<label>Potassium (K)</label>
<input type="number" class="form-control" name="K" required>
</div>

<div class="col-md-6 mb-3">
<label>Temperature (°C)</label>
<input type="number" step="0.01" class="form-control" name="temperature" required>
</div>

<div class="col-md-6 mb-3">
<label>Humidity (%)</label>
<input type="number" step="0.01" class="form-control" name="humidity" required>
</div>

<div class="col-md-6 mb-3">
<label>pH Level</label>
<input type="number" step="0.01" class="form-control" name="ph" required>
</div>

<div class="col-md-6 mb-3">
<label>Rainfall (mm)</label>
<input type="number" step="0.01" class="form-control" name="rainfall" required>
</div>

</div>

<div class="text-center">
<button class="btn btn-success btn-lg">
Predict Crop
</button>
</div>

</form>

</div>

</div>

</body>
</html>
